  <!-- Page‑scoped styling for Bear Magic -->
  <style>
    /* ===== Bear Magic page-scoped rules ===== */
    body.magic-page { background: var(--bg); color: var(--ink); }
    .container { max-width: 1180px; margin: 24px auto; padding: 0 16px; }
    .panel { margin-bottom: 16px; }
    .panel.panel-glass { padding: 14px; }

    .h2 { font-size: 22px; font-weight: 800; margin: 0 0 8px; }
    .muted { color: var(--muted); }

    /* --- Brighter tables, better readability --- */
    /* ===== MATCH OPTION‑A TABLE LOOK IN MAGIC ===== */

    /* Main table container */
    #callRallyTable table,
    #joinTableWrap table,
    #scoreboardTableWrap table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid rgba(255,140,140,0.18);
      border-radius: 14px;
      overflow: auto;
      table-layout: auto;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
    }

    /* Header row */
    #callRallyTable thead th,
    #joinTableWrap thead th,
    #scoreboardTableWrap thead th {
      text-align: center;
      padding: 10px;
      background: linear-gradient(180deg, rgba(18, 80, 18, 0.9), rgba(12, 60, 14, 0.85));
      color: #ffecec;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: .2px;
      border-bottom: 1px solid rgba(179, 255, 160, 0.25);
    }

    /* Table body rows */
    #callRallyTable tbody td,
    #joinTableWrap tbody td,
    #scoreboardTableWrap tbody td {
      padding: 9px 10px;
      color: #ffe9e9;
      border-bottom: 1px solid rgba(255,160,160,.12);
      font-size: 14px;
    }

    /* Last row border cleanup */
    #callRallyTable tbody tr:last-child td,
    #joinTableWrap tbody tr:last-child td,
    #scoreboardTableWrap tbody tr:last-child td {
      border-bottom: 0;
    }

    /* Mobile adjustments */
    @media (max-width: 640px){
      #callRallyTable table,
      #joinTableWrap table,
      #scoreboardTableWrap table {
        table-layout: fixed;
        width: 100% !important;
      }

      #callRallyTable th, #callRallyTable td,
      #joinTableWrap th, #joinTableWrap td,
      #scoreboardTableWrap th, #scoreboardTableWrap td {
        padding: 6px 8px !important;
        font-size: 12px !important;
        word-wrap: break-word;
      }
    }
    #callRallyTable tbody tr:last-child td,
    #joinTableWrap tbody tr:last-child td,
    #scoreboardTableWrap tbody tr:last-child td { border-bottom: 0; }

    /* --- Desktop layout stays the same: two-column table zones --- */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 980px) { .grid-2 { grid-template-columns: 1fr; } }

    /* --- MOBILE FIT: tables must fit the screen --- */
    /* On mobile, let tables truly fit, reduce font slightly, allow tighter cell padding */
    @media (max-width: 640px){
      .magic-page .panel.panel-glass{ padding: 12px; }
      .magic-page #callRallyTable table,
      .magic-page #joinTableWrap table,
      .magic-page #scoreboardTableWrap table{
        table-layout: fixed;     /* equalize columns so it fits */
        width: 100% !important;
      }
      .magic-page #callRallyTable th, .magic-page #callRallyTable td,
      .magic-page #joinTableWrap th, .magic-page #joinTableWrap td,
      .magic-page #scoreboardTableWrap th, .magic-page #scoreboardTableWrap td{
        padding: 6px 8px !important;
        font-size: 12px !important;
        word-wrap: break-word;
      }
    }

    /* --- REORDER on mobile: put "Using tier… + Recommended + No marches…" BELOW tables --- */
    /* We wrap the three logical blocks with ids: bm_topinfo, bm_tables, bm_bottom */
    .bm-flow { display: grid; gap: 14px; }
    @media (min-width: 981px){
      /* desktop — keep original order: topinfo → tables → bottom group */
      .bm-topinfo{ order: 1; }
      .bm-tables { order: 2; }
      .bm-bottom { order: 3; }
    }
    @media (max-width: 640px){
      /* mobile — place tables first, then info, then bottom group */
      .bm-tables { order: 1; }
      .bm-topinfo{ order: 2; }
      .bm-bottom { order: 3; }
    }

    /* --- Make the "Recommended" button look like primary compact if not already --- */
    #btnUseRecommended.btn, #btnUseRecommended{
      background: linear-gradient(90deg,#22d3ee,#60a5fa);
      color:#05121f; border:0; font-weight:600; padding:8px 12px; border-radius:12px;
      box-shadow:0 6px 18px rgba(34,211,238,.25);
      display:inline-flex; align-items:center; gap:8px;
    }
    #btnUseRecommended:hover{ filter:brightness(1.05); transform: translateY(-1px); }
    #btnUseRecommended:active{ transform: translateY(0); }

    /* subtle emphasis lines */
    .magic-subtle{ color:#cdd6e8; }
  </style>
</head>

        <input id="inf_atk" value="481.6" /><div id="err_inf_atk"></div>

        <!-- (B) TABLES (call / join) -->

              <div id="callRallyTable" class="table-glass" style="margin-top:10px"></div>
              <div id="joinTableWrap" class="table-glass" style="margin-top:10px"></div>

        <!-- (C) BOTTOM (scoreboard + inventory) -->
        <div id="bm_bottom" class="bm-bottom">

            <div>
              <h3>Inventory</h3>
              <div id="inventoryReadout" class="muted" style="white-space:pre-line"></div>
            </div>
          </div>
        </div>

      </div>
      <!-- ===== end MAGIC CONTENT FLOW ===== -->

      <input id="hiddenLastMode" type="hidden" value="magic12" />
      <input id="hiddenBestFractions" type="hidden" value="" />
    </section>

  <!-- Self-healing & autorun (unchanged logic) -->
  <script>
    (function(){
      'use strict';
      const INPUT_IDS = ['inf_atk','inf_let','cav_atk','cav_let','arc_atk','arc_let',
        'troopTier','stockInf','stockCav','stockArc','rallySize','marchSize','numFormations'];
      const VALIDATION_IDS = ['validationSummary','validationList',
        'err_inf_atk','err_inf_let','err_cav_atk','err_cav_let','err_arc_atk','err_arc_let',
        'err_troopTier','err_stockInf','err_stockCav','err_stockArc','err_rallySize','err_marchSize','err_numFormations'];
      const VISIBLE_IDS = ['selectedTierNote','fractionReadout','callRallyTable','recommendedDisplay',
        'joinTableWrap','scoreboardTableWrap','inventoryReadout','bm_qualityNote',
        'hiddenLastMode','hiddenBestFractions','btnUseRecommended'];

      function ensureHost(){
        let host = document.getElementById('bm_hidden_host');
        if (!host){ host = document.createElement('div'); host.id='bm_hidden_host'; host.style.display='none'; document.body.appendChild(host); }
        let stash = document.getElementById('bm_auto_hidden_stash');
        if (!stash){ stash = document.createElement('div'); stash.id='bm_auto_hidden_stash'; stash.style.display='none'; host.appendChild(stash); }
        return { stash };
      }
      function createHiddenInput(id){ const el = document.createElement('input'); el.type='text'; el.id=id; el.style.display='none'; return el; }
      function createVisibleContainer(id){ const el = document.createElement('div'); el.id=id; return el; }

      // Self‑healing getElementById
      (function installSelfHealingGetEl(){
        const orig = document.getElementById.bind(document);
        const { stash } = ensureHost();
        document.getElementById = function(id){
          let el = orig(id);
          if (!el){
            if (VISIBLE_IDS.includes(id)) {
              el = createVisibleContainer(id);
              (document.querySelector('.container .panel') || document.body).appendChild(el);
            } else {
              if (id === 'troopTier') {
                const sel = document.createElement('select'); sel.id=id; sel.style.display='none';
                ['T6','T9','T10','T10.TG1','T10.TG2','T10.TG3','T10.TG4','T10.TG5'].forEach(v=>{
                  const o=document.createElement('option'); o.value=v; o.textContent=v; if(v==='T10.TG1') o.selected=true; sel.appendChild(o);
                });
                el = sel;
              } else {
                el = createHiddenInput(id);
              }
              stash.appendChild(el);
            }
          }
          return el;
        };
      })();

      function run(){
        const s = document.getElementById('bm_status');
        try{
          const { stash } = ensureHost();
          [...INPUT_IDS, ...VALIDATION_IDS].forEach(id=>{
            if (!document.getElementById(id)) stash.appendChild(createHiddenInput(id));
          });
          VISIBLE_IDS.forEach(id=>{
            if (!document.getElementById(id)) {
              (document.querySelector('.container .panel') || document.body)
                .appendChild(createVisibleContainer(id));
          }});

          // Load Troops & Stats
          if (window.KingState && typeof KingState.load === 'function') KingState.load();

          // Initialize & compute
          if (window.Magic && typeof Magic.init === 'function') Magic.init();
          if (window.Magic && typeof Magic.compute === 'function') Magic.compute('magic12');

          if (s){ s.textContent=''; s.className=''; }
        }catch(err){
          console.error('[Bear Magic] failed:', err);
          if (s){ s.textContent = 'Error: ' + (err?.message||err); s.style.color='#ef4444'; }
        }
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
      else run();
      window.runBearMagic = run;
    })();
  </script>
